<html lang="en"></html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incapacidades</title>
    <link rel="stylesheet" href="../Resources/css/Empleado/incapacidades.css">

</head>
<body>
   
    <div class="container">
        <aside class="sidebar">
            <div class="logito">
            <img src="/Resources/Images/logo.png" alt="">
            </div>
            <ul class="menu">
                <li><a href="./perfil.html"><img src="../Resources/Images/Icons/user-solid.svg" alt="Icono Directorio"> Perfil</a></li>
                <li><a href="./vacantes.html"><img src="../Resources/Images/Icons/briefcase-solid.svg" alt="Icono Vacantes"> Vacantes</a></li>
                <li><a href="./vacaciones.html"><img src="../Resources/Images/Icons/suitcase-solid.svg" alt="Icono Vacaciones"> Vacaciones</a></li>
                <li><a href="./Incapacidades.html"><img src="../Resources/Images/Icons/book-medical-solid.svg" alt="Icono Incapacidades"> Incapacidades</a></li>
                <li><a href="./horasextra.html"><img src="/Resources/Images/Icons/calendar-plus-solid.svg" alt="Icono Horas Extra"> Horas extra</a></li>
            </ul>
            <div class="logout">
            <a href="/index.html"><button class="logout-button">Cerrar Sesión</button></a>
            </div>
        </aside>
        <main class="main-content">
            <div class="top-bar">
                <div class="search-bar">
                    <input type="text" placeholder="Search">
                </div>
                <div class="user-info">
                    <div class="icons">
                        <img src="/Resources/Images/Icons/notificaciones.png" alt="Notification Icon">
                    </div>
                    <div class="user-profile">
                        <img src="/Resources/Images/1.jpg" alt="User Avatar" class="avatar">
                        <div class="user-details">
                            <span class="user-name">Yon Piter Ruiz</span>
                            <span class="user-email">Jefe Personal</span>
                        </div>
                    </div>
                </div>
            </div>
            <section class="dashboard">
                <div class="titulo">
                    <h1 class="letra">Incapacidades</h1>
                </div>

                <div class="formulario">
                    <h1>¡Esperamos que te mejores pronto! <br> Completa tu solicitud de Incapacidad</h1>
                    <form class="cuadro" action="/enviar-solicitud" method="post">
                        <div class="parte1">
                        <div class="form-row">
                            <label for="nombre">Nombre del Empleado:</label>
                            <input type="text" id="nombre" name="nombre" required>
                        </div>
                        <div class="form-row">
                            <label for="posicion">Posición:</label>
                            <input type="text" id="posicion" name="posicion" required>
                        </div>
                        <div class="form-row">
                            <label for="fecha-solicitud">Fecha de Solicitud:</label>
                            <input type="date" id="fecha-solicitud" name="fecha_solicitud" required>
                        </div>
                        <div class="button-container">
                            <button type="reset">Borrar</button>
                        </div>
                        </div>
                        <div class="parte2">
                        <div class="form-row full-width">
                            <label for="fecha-inicio">Fecha de Inicio de Vacaciones:</label>
                            <input type="date" id="fecha-inicio" name="fecha_inicio" required>
                        </div>
                        <div class="form-row full-width">
                            <label for="fecha-fin">Fecha de Fin de Vacaciones:</label>
                            <input type="date" id="fecha-fin" name="fecha_fin" required>
                        </div>
                        <div class="form-row full-width">
                            <label for="numero-dias">Número de Días Solicitados:</label>
                            <input type="number" id="numero-dias" name="numero_dias" min="1" required>
                        </div>
                        <div class="button-container">
                            <button type="submit">Enviar Solicitud</button>
                        </div>
                        </div>
            
                        
                    </form>
                </div>
            
             </section>
        </main>
        
    </div>
</body>
</html>
